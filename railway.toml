[build]
builder = "NIXPACKS"
buildCommand = "cd backend && chmod +x mvnw && ./mvnw -DskipTests clean package"

[deploy]
startCommand = "cd backend && java -jar target/student-management-backend-1.0.0.jar"
healthcheckPath = "/api/students"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
